name: monorepo-ci

on:
  push:
    branches:
      - main
    paths:
      - "services/api/**"
  pull_request:
    branches:
      - main
    paths:
      - "services/api/**"

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: git checkout HEAD
      - name: Build
        run: make -C services/api build
