# azure-pipelines.yml — progressive rollout via a canary strategy.
trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Deploy
    jobs:
      - deployment: DeployProd
        environment: production
        strategy:
          canary:
            increments: [10, 20]
            deploy:
              steps:
                - script: echo "Deploying canary increment"
                  displayName: Deploy
