name: ci

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make build

  notify:
    needs: build
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Post failure to Microsoft Teams
        uses: aliencube/microsoft-teams-actions@v0.8.0
        with:
          webhook_uri: ${{ secrets.TEAMS_WEBHOOK_URL }}
          title: "CI failed on ${{ github.ref_name }}"
          summary: "Build failed"
          text: "Pipeline ${{ github.workflow }} failed. See the run for details."
