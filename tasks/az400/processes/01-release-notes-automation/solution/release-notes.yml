name: release-notes

# Fire whenever a semver tag is pushed, so notes are generated straight from
# Git history at the point the release is cut.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate release notes from Git history
        id: notes
        run: |
          PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then
            RANGE="${PREV}..${GITHUB_REF_NAME}"
          else
            RANGE="${GITHUB_REF_NAME}"
          fi
          git log --pretty=format:"- %s (%h)" "$RANGE" > NOTES.md
      - name: Publish GitHub Release with the generated notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: NOTES.md
